<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#101B33"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="22%" r="60%">
      <stop offset="0" stop-color="#2F6DF6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2F6DF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="75%" r="65%">
      <stop offset="0" stop-color="#6F50FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6F50FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="560" height="700" rx="44" fill="url(#bg)"/>
  <rect width="560" height="700" rx="44" fill="url(#glow)"/>
  <rect width="560" height="700" rx="44" fill="url(#glow2)"/>

  <!-- subtle vignette -->
  <rect width="560" height="700" rx="44" fill="black" opacity="0.28"/>
  <ellipse cx="280" cy="340" rx="270" ry="340" fill="black" opacity="0.24" filter="url(#soft)"/>

  <!-- calm monogram placeholder -->
  <g fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2">
    <path d="M72 86h416" />
    <path d="M72 614h416" />
  </g>
  <g>
    <circle cx="280" cy="290" r="86" fill="rgba(255,255,255,0.10)"/>
    <path d="M190 520c26-56 76-92 130-92s104 36 130 92" fill="rgba(255,255,255,0.10)"/>
    <circle cx="280" cy="290" r="86" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <path d="M190 520c26-56 76-92 130-92s104 36 130 92" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  </g>

  <text x="56" y="660" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" fill="rgba(255,255,255,0.42)">
    Replace this with your photo ’ `public/`
  </text>
</svg>

