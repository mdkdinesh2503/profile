<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var stored = localStorage.getItem("profile-theme");
        var useDark = stored === "dark";
        if (useDark)
          document.documentElement.classList.add("dark");
        else
          document.documentElement.classList.remove("dark");
      })();
    </script>
    <!-- Primary SEO: name first so "Dinesh" and "MDK" match search intent -->
    <title>Dinesh Kumar M</title>

    <meta name="keywords" content="Dinesh, Dinesh Kumar, Dinesh Kumar M, MDK, mdk, profile, portfolio" />
    <meta name="author" content="Dinesh Kumar M" />
    <link rel="canonical" href="https://your-profile-url.com/" />
    <!-- Open Graph for social & search -->
